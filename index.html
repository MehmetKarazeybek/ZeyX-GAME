<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elif Hocammm</title>
    <style>
        /* === TEMEL AYARLAR === */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #050505;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* === GİRİŞ METNİ (HAVALI ALT YAZI EKLENDİ) === */
        .intro-container {
            position: absolute;
            top: 8%;
            width: 100%;
            z-index: 5;
            text-align: center;
            pointer-events: none;
        }

        .intro-text {
            opacity: 0;
            animation: appear 2s ease forwards;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 6px;
            margin-bottom: 8px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ffffff, #a0a0a0, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 8s linear infinite;
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-style: normal;
            opacity: 0.8;
            /* Hafif parıltı efekti */
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        /* === ÇİÇEK ALANI === */
        .flower-stage {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 10;
        }

        .flower-wrapper {
            width: 480px;
            height: 650px;
            position: relative;
            transform: translateY(100%);
            animation: slideUp 1.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.5s;
            cursor: pointer;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.9));
            transform-origin: bottom center;
        }

        /* === AL BUTONU === */
        .tag-group {
            position: absolute;
            bottom: 150px;
            left: 65%;
            z-index: 20;
            animation: gentleSwing 4s ease-in-out infinite;
            transform-origin: top center;
        }

        .tag-card {
            background: #fdfbf7;
            color: #111;
            padding: 12px 30px;
            font-family: 'Didot', 'Times New Roman', serif;
            font-weight: bold;
            font-size: 1.8rem;
            border-radius: 2px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
            position: relative;
            transition: all 0.3s;
            border: 1px solid #ccc;
        }

        .tag-string {
            position: absolute;
            top: -50px;
            left: 20px;
            width: 2px;
            height: 55px;
            background: #d7ccc8;
        }

        /* === MESAJ KUTUSU === */
        .message-modal {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            width: 340px;
            background: rgba(18, 18, 18, 0.98);
            border: 1px solid #333;
            border-top: 3px solid #d81b60;
            padding: 35px;
            border-radius: 16px;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 100;
            box-shadow: 0 40px 100px rgba(0,0,0,1);
        }

        .message-modal.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) scale(1);
        }

        .msg-title {
            font-size: 1.3rem;
            color: #f48fb1;
            margin-bottom: 15px;
            font-weight: 600;
            line-height: 1.4;
        }

        .msg-body {
            font-size: 1rem;
            color: #ddd;
            line-height: 1.6;
            font-weight: 300;
        }

        /* === ANİMASYONLAR === */
        @keyframes appear { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { to { transform: translateY(40px); } }
        @keyframes shineText { to { background-position: 200% center; } }
        @keyframes gentleSwing { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }

        @media (max-width: 480px) {
            h1 { font-size: 2rem; letter-spacing: 3px; }
            .subtitle { font-size: 0.75rem; letter-spacing: 2px; }
            .flower-wrapper { width: 350px; height: 520px; }
            .message-modal { width: 90%; top: 20%; }
        }
    </style>
</head>
<body>

    <audio id="birthdaySong" src="ses.mp3" preload="auto"></audio>

    <div class="intro-container">
        <div class="intro-text">
            <h1>Elif Hocammm</h1>
            <p class="subtitle">Zihni aydınlatan, ruhu çiçek açtıran...</p>
        </div>
    </div>

    <div class="flower-stage">
        <div class="flower-wrapper" onclick="handleAction()">

            <svg viewBox="0 0 480 680" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="roseReal" cx="40%" cy="30%" r="70%">
                        <stop offset="0%" stop-color="#ff5252" /><stop offset="50%" stop-color="#c62828" /><stop offset="100%" stop-color="#5e0000" />
                    </radialGradient>
                    <linearGradient id="tulipPink" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#ff80ab"/><stop offset="100%" stop-color="#ad1457"/>
                    </linearGradient>
                    <linearGradient id="paperWrap" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#3e2723"/><stop offset="50%" stop-color="#5d4037"/><stop offset="100%" stop-color="#3e2723"/>
                    </linearGradient>
                    <filter id="shadowCast"><feDropShadow dx="0" dy="5" stdDeviation="5" flood-opacity="0.4"/></filter>
                </defs>

                <g transform="translate(240, 380)">
                    <path d="M0 0 C-60 -80 -140 -120 -120 -220 C-80 -150 0 -120 0 0" fill="#1b5e20" />
                    <path d="M0 0 C60 -80 140 -120 120 -220 C80 -150 0 -120 0 0" fill="#1b5e20" />
                    <path d="M0 0 C-30 -100 -50 -200 -20 -260 C10 -200 20 -100 0 0" fill="#2e7d32" />
                    <path d="M-50 0 Q-100 -100 -140 -200" fill="none" stroke="#546e7a" stroke-width="2"/>
                    <circle cx="-140" cy="-200" r="6" fill="#78909c"/><circle cx="-120" cy="-160" r="5" fill="#78909c"/><circle cx="-100" cy="-120" r="6" fill="#78909c"/>
                </g>

                <path d="M240 680 L90 300 L390 300 Z" fill="url(#paperWrap)" filter="url(#shadowCast)"/>

                <g transform="translate(240, 320)" filter="url(#shadowCast)">
                    <g transform="translate(-100, -40)">
                         <path d="M0 80 L0 0" stroke="#33691e" stroke-width="3"/>
                         <g fill="#7e57c2">
                             <circle cx="0" cy="0" r="10" fill="#9575cd"/><circle cx="10" cy="-10" r="12" fill="#7e57c2"/><circle cx="-10" cy="-10" r="11" fill="#673ab7"/>
                         </g>
                    </g>
                    <g transform="translate(90, -20) rotate(15)">
                        <path d="M0 80 L0 0" stroke="#33691e" stroke-width="4"/>
                        <path d="M0 0 C-25 -10 -25 -50 0 -70 C25 -50 25 -10 0 0" fill="url(#tulipPink)"/>
                    </g>
                    <g transform="translate(-40, 10) rotate(-10) scale(1.1)">
                        <path d="M-10 -10 C-30 -30 -10 -60 10 -50 C30 -40 20 0 10 10 C-10 20 -20 0 -10 -10" fill="url(#roseReal)"/>
                    </g>
                    <g transform="translate(50, 20) scale(1.2)">
                        <circle cx="0" cy="-30" r="35" fill="#f48fb1"/><circle cx="0" cy="-30" r="25" fill="#f06292"/>
                    </g>
                    <g transform="translate(0, -100)">
                        <path d="M0 100 L0 0" stroke="#33691e" stroke-width="3"/><path d="M0 0 Q-20 -30 -40 -20 L0 0" fill="#fff"/><path d="M0 0 Q20 -30 40 -20 L0 0" fill="#fff"/>
                    </g>
                </g>
                <path d="M240 680 L120 350 Q240 420 360 350 Z" fill="url(#paperWrap)" opacity="0.95"/>
                <path d="M220 450 Q240 470 260 450" fill="none" stroke="#d7ccc8" stroke-width="6" stroke-linecap="round"/>
            </svg>

            <div class="tag-group">
                <div class="tag-string"></div>
                <div class="tag-card">AL</div>
            </div>

            <div class="message-modal" id="msgModal">
                <div class="msg-title">İyi ki Doğdun!</div>
                <div class="msg-body">
                    Doğum gününüz kutlu olsun efnm, <br>
                    <strong>daha nice güzel senelere.</strong>
                </div>
            </div>

        </div>
    </div>

    <script>
        function handleAction() {
            const modal = document.getElementById('msgModal');
            const audio = document.getElementById('birthdaySong');

            if (modal.classList.contains('active')) {
                modal.classList.remove('active');
                audio.pause();
            } else {
                modal.classList.add('active');
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Müzik hatası:", e));
            }
        }
    </script>
</body>
</html>
